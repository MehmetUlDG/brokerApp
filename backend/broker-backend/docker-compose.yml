services:
  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL 15
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: broker_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: broker_user
      POSTGRES_PASSWORD: broker_secret
      POSTGRES_DB: broker_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d  # SQL migrations auto-run on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U broker_user -d broker_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - broker_net

  # ─────────────────────────────────────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: broker_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_secret --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - broker_net

  # ─────────────────────────────────────────────────────────────────────────────
  # Zookeeper (Kafka bağımlılığı)
  # ─────────────────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: broker_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      # nc ve cub bu image'da yok; bash built-in TCP soket ile port kontrolü yapılır.
      # Zookeeper 2181'e bağlanabiliyorsak servis hazırdır.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/2181 2>/dev/null && echo ok >&3' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - broker_net

  # ─────────────────────────────────────────────────────────────────────────────
  # Apache Kafka (Confluent Platform 7.6)
  # ─────────────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: broker_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"      # Host'tan erişim (Go uygulaması için)
      - "29092:29092"    # Docker network içi erişim
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - broker_net

  # ─────────────────────────────────────────────────────────────────────────────
  # Kafka UI (Opsiyonel - Topic/Message izleme için)
  # ─────────────────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: broker_kafka_ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: broker-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - broker_net
    # ─────────────────────────────────────────────────────────────────────────────
    # Payment Service
    # ─────────────────────────────────────────────────────────────────────────────

  payment-service:
     build:
       context: ../payment-service   # ← klasör adını kendi yapına göre düzenle
       dockerfile: DockerFile
     container_name: broker_payment
     restart: unless-stopped
     ports:
       - "50051:50051"   # gRPC
       - "8081:8081"     # HTTP (webhook)
     environment:
       DATABASE_URL: postgres://broker_user:broker_secret@postgres:5432/broker_db?sslmode=disable
       STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
       STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
       KAFKA_BROKERS: kafka:29092
       GRPC_PORT: "50051"
       HTTP_PORT: "8081"
     depends_on:
      postgres:
         condition: service_healthy
      kafka:
         condition: service_healthy
     networks:
       - broker_net
  # ─────────────────────────────────────────────────────────────────────────────
  # Matching Engine Service
  # ─────────────────────────────────────────────────────────────────────────────

  matching-engine:
    build:
      context: ../matching-engine
      dockerfile: Dockerfile
    container_name: broker_matching
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: kafka:29092  # → Kafka servisine bağlanacağı adres
      GRPC_PORT: "50050"
    depends_on:
     kafka:
       condition: service_healthy
    networks:
     - broker_net

  # ─────────────────────────────────────────────────────────────────────────────
  # Ingestion Service
  # ───────────────────────────────────────────────────────────────────────────── 

  ingestion-service:
    build:
      context: ../ingestion-service
      dockerfile: Dockerfile
    container_name: broker_ingestion
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - broker_net  
# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_logs:
    driver: local
  kafka_data:
    driver: local

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  broker_net:
    driver: bridge

